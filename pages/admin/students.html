<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../../assets/images/logo/Phonic_logo.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONIC - Data Siswa</title>
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="../../css/global/variables.css">
  <link rel="stylesheet" href="../../css/global/global.css">
  <link rel="stylesheet" href="../../css/global/animation.css">
  
  <!-- Component -->
  <link rel="stylesheet" href="../../css/components/navbar.css">
  
  <!-- Page Specific -->
  <link rel="stylesheet" href="../../css/admin/dashboard.css"> <!-- For header & search base styles -->
  <link rel="stylesheet" href="../../css/admin/students.css">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../css/components/toast.css">
  <link rel="stylesheet" href="../../css/components/logout-modal.css">
</head>
<body class="admin-body">

  <main class="admin-main">
    
    <!-- ─────────────────────────── TOP SECTION (Unified Blue Background) ─────────────────────────── -->
    <div class="adm-top-section std-top">
      
      <!-- ─────────────────────────── HEADER ─────────────────────────── -->
      <header class="adm-header">
        <div class="adm-header__left">
          <button class="adm-icon-btn back-btn" onclick="history.back()" aria-label="Kembali">
            <i class="ph ph-caret-left"></i>
          </button>
          <div class="adm-header__text-group">
            <p class="adm-header__sub">Manajemen</p>
            <h1 class="adm-header__name">Data Siswa</h1>
          </div>
        </div>
        <div class="adm-header__right">
          <div class="adm-avatar auth-avatar-trigger" aria-label="Admin">T</div>
        </div>
      </header>

      <!-- ─────────────────────────── SEARCH ─────────────────────────── -->
      <div class="adm-search" style="margin-bottom:0;">
        <i class="ph ph-magnifying-glass adm-search__icon"></i>
        <input
          type="search"
          id="searchInput"
          class="adm-search__input"
          placeholder="Cari Nama Siswa, NISN, atau Kelas..."
          aria-label="Cari"
        >
      </div>
    </div>

    <!-- ─────────────────────────── WHITE CONTENT AREA ─────────────────────── -->
    <div class="adm-content-area" style="padding-top: var(--space-md);">
      
      <!-- ─────────────────────────── CHIP FILTERS ─────────────────────────── -->
      <div class="std-filters">
        <!-- Kelas Filter -->
        <div class="std-filter-scroll">
          <button class="std-chip active" data-filter-type="kelas" data-filter-val="all">Semua Kelas</button>
          <button class="std-chip" data-filter-type="kelas" data-filter-val="1">Kelas 1</button>
          <button class="std-chip" data-filter-type="kelas" data-filter-val="2">Kelas 2</button>
          <button class="std-chip" data-filter-type="kelas" data-filter-val="3">Kelas 3</button>
          <button class="std-chip" data-filter-type="kelas" data-filter-val="4">Kelas 4</button>
          <button class="std-chip" data-filter-type="kelas" data-filter-val="5">Kelas 5</button>
          <button class="std-chip" data-filter-type="kelas" data-filter-val="6">Kelas 6</button>
        </div>
        
        <!-- Level Filter -->
        <div class="std-filter-scroll">
          <button class="std-chip active" data-filter-type="level" data-filter-val="all">Semua Level</button>
          <button class="std-chip" data-filter-type="level" data-filter-val="1">Level 1</button>
          <button class="std-chip" data-filter-type="level" data-filter-val="2">Level 2</button>
          <button class="std-chip" data-filter-type="level" data-filter-val="3">Level 3</button>
          <button class="std-chip" data-filter-type="level" data-filter-val="4">Level 4+</button>
        </div>
      </div>

      <!-- ─────────────────────────── LIST / GRID CONTAINER ─────────────────────────── -->
      <div class="std-container" id="studentContainer">
        <!-- JS will inject student cards here -->
      </div>

      <!-- ─────────────────────────── EMPTY STATE ─────────────────────────── -->
      <div class="std-empty hidden" id="emptyState">
        <img src="../../assets/images/mascot/mascot-home.png" alt="Voxy Bingung" class="std-empty__img">
        <h3 class="std-empty__title">Siswa tidak ditemukan</h3>
        <p class="std-empty__desc">Coba gunakan kata kunci pencarian atau filter yang berbeda.</p>
      </div>

    </div>

    <div style="height:24px;"></div>
  </main>

  <!-- ░░ BOTTOM NAVIGATION ░░ -->
  <div data-component="../../components/bottom-nav-admin.html"></div>

  <!-- Scripts -->
  <script src="../../js/data/students-data.js"></script>
    <!-- Auth Guard � must load before any page script -->
  <script src="../../js/data/users.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script>Auth.checkRole('admin');</script>
  <script src="../../js/components/toast.js"></script>
  <script src="../../js/components/logout-modal.js"></script>
  <script src="../../js/core/component-loader.js"></script>
  <script src="../../js/admin/students.js"></script>
</body>
</html>
