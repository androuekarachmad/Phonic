<!-- components/popup-vocabulary.html -->
<div class="vocab-popup" id="vocabPopup" style="display: none;">
  <div class="vocab-popup__content">
    
    <button class="vocab-popup__close" onclick="closeVocabPopup()" aria-label="Close">
      <i class="ph ph-x"></i>
    </button>
    
    <div class="vocab-popup__header">
      <h3 class="vocab-popup__word" id="vocabWord">Word</h3>
      <button class="vocab-popup__speaker" id="vocabSpeaker" aria-label="Speak">
        <i class="ph-fill ph-speaker-high"></i>
      </button>
    </div>
    
    <div class="vocab-popup__pronunciation" id="vocabPronunciation">/wɜːd/</div>
    
    <div class="vocab-popup__meaning">
      <span class="meaning-label">Arti:</span>
      <span class="meaning-text" id="vocabMeaning">Kata</span>
    </div>

  </div>
</div>
