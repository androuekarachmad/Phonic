<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../../assets/images/logo/Phonic_logo.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONIC - Game Result</title>
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="../../css/global/global.css">
  
  <!-- Component Styles -->
  <link rel="stylesheet" href="../../css/components/button.css">
  <link rel="stylesheet" href="../../css/components/modal.css">
  
  <!-- Page Specific Styles -->
  <link rel="stylesheet" href="../../css/student/game-result.css">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../css/components/toast.css">
  <link rel="stylesheet" href="../../css/components/logout-modal.css">
</head>
<body id="resultBody" class="result-success"> <!-- Class will be replaced by JS -->

  <div class="container result-container">
    
    <!-- Content -->
    <div class="result-content">
      <div class="result-icon" id="resultIcon">
        <!-- Icon injected via JS -->
      </div>
      
      <h1 class="result-title" id="resultTitle">Hebat!</h1>
      <p class="result-subtitle" id="resultSubtitle">Jawaban kamu benar.</p>
      
      <div class="points-badge">
        <i class="ph-fill ph-coin" style="color: #fcc419;"></i>
        <span id="resultPoints">+100</span>
      </div>
      
      <div class="mascot-container">
        <!-- Use mascot image -->
        <img src="../../assets/images/mascot/mascot-game.png" alt="Mascot" class="result-mascot">
      </div>
    </div>

    <!-- Action Button -->
    <div class="action-container">
      <button class="btn btn-primary btn-next" id="nextBtn">Berikutnya</button>
    </div>

  </div>

  <!-- Game Complete Modal -->
  <div id="gameCompleteModal" class="modal-backdrop" style="display: none;">
    <div class="modal-container" style="text-align: center; padding: 32px 24px; max-width: 320px;">
      <i class="ph-fill ph-trophy" style="font-size: 64px; color: #fcc419; margin-bottom: 16px;"></i>
      <h2 style="font-size: 24px; color: var(--color-primary-dark); margin-bottom: 8px;">Luar Biasa!</h2>
      <p style="color: var(--color-text-muted); margin-bottom: 24px; font-size: 15px;">Kamu telah menyelesaikan semua soal di level ini.</p>
      
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button id="playAgainBtn" class="btn btn-primary" style="width: 100%; padding: 14px; border-radius: var(--radius-md);">Main Lagi</button>
        <button id="exitGameBtn" class="btn" style="width: 100%; padding: 14px; border-radius: var(--radius-md); background: #f1f3f5; color: var(--color-text-main); font-weight: 700;">Keluar</button>
      </div>
    </div>
  </div>

  <!-- Auth Guard Ś must load before any page script -->
  <script src="../../js/data/users.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script>Auth.checkRole('student');</script>
  <script src="../../js/components/toast.js"></script>
  <script src="../../js/components/logout-modal.js"></script>
    <!-- Data Scripts -->
  <script src="../../js/data/games.js"></script>
  
  <!-- Auth Guard Ś must load before any page script -->
  <script src="../../js/data/users.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script>Auth.checkRole('student');</script>
  <script src="../../js/components/toast.js"></script>
  <script src="../../js/components/logout-modal.js"></script>
    <!-- Page Scripts -->
  <script src="../../js/student/game-result.js"></script>
</body>
</html>
